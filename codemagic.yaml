# MISO Dental Lab — iOS App Store 빌드 (맥 없이 클라우드 빌드)
# Codemagic → 이 레포 연결 → App Store Connect API 키(MISO_ASC_KEY) 등록 후 빌드
# 서명 인증서/프로필은 빌드 중 자동 생성됩니다 (fetch-signing-files --create).
workflows:
  ios-appstore:
    name: MISO iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: MISO_ASC_KEY      # ← Codemagic 개발자 포털 통합에 등록한 API 키 이름
    environment:
      vars:
        BUNDLE_ID: "com.misodentallab.app"
        XCODE_WORKSPACE: "src/MISO.xcworkspace"
        XCODE_SCHEME: "MISO"
        APP_STORE_APPLE_ID: 6789481602     # MISO Dental Lab (App Store Connect)
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install CocoaPods dependencies
        script: |
          cd "$CM_BUILD_DIR/src"
          pod install || pod install --repo-update
      - name: Remove Associated Domains entitlement (App ID has no such capability)
        script: |
          python3 - << 'PY'
          import plistlib, os
          p = os.path.join(os.environ["CM_BUILD_DIR"], "src/MISO/Entitlements/Entitlements.plist")
          d = plistlib.load(open(p, "rb"))
          d.pop("com.apple.developer.associated-domains", None)
          plistlib.dump(d, open(p, "wb"))
          print("associated-domains entitlement removed")
          PY
      - name: Clean up old signing certificates & profiles (avoid Apple cert limit)
        script: |
          # 매 빌드마다 새 서명키를 만들기 때문에, 기존 배포 인증서/프로필을 먼저 정리하고 새로 생성한다.
          CERT_IDS=$(app-store-connect certificates list --type IOS_DISTRIBUTION --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(' '.join(c.get('id','') for c in (d if isinstance(d,list) else [])))" 2>/dev/null || echo "")
          for ID in $CERT_IDS; do echo "revoke cert $ID"; app-store-connect certificates delete "$ID" --ignore-not-found 2>/dev/null || true; done
          PROF_IDS=$(app-store-connect profiles list --type IOS_APP_STORE --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(' '.join(p.get('id','') for p in (d if isinstance(d,list) else [])))" 2>/dev/null || echo "")
          for ID in $PROF_IDS; do echo "delete profile $ID"; app-store-connect profiles delete "$ID" --ignore-not-found 2>/dev/null || true; done
          echo "signing cleanup done"
      - name: Set up code signing (auto-create cert + profile)
        script: |
          set -e
          keychain initialize
          # 서명용 개인키: 저장된 값이 있으면 재사용, 없으면 새로 생성
          if [ -z "$CERTIFICATE_PRIVATE_KEY" ]; then
            ssh-keygen -t rsa -b 2048 -m PEM -f /tmp/cert_key -q -N ""
            CERT_KEY_REF="@file:/tmp/cert_key"
          else
            CERT_KEY_REF="@env:CERTIFICATE_PRIVATE_KEY"
          fi
          # 배포 인증서 + App Store 프로비저닝 프로필을 새로 생성/가져오기
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key "$CERT_KEY_REF" \
            --create \
            --delete-stale-profiles
          keychain add-certificates
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd "$CM_BUILD_DIR/src" 2>/dev/null || cd "$CM_BUILD_DIR"
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)
          agvtool new-version -all $((LATEST + 1)) 2>/dev/null || true
      - name: Build ipa
        script: |
          xcode-project build-ipa --workspace "$CM_BUILD_DIR/$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true          # TestFlight 업로드 (심사 제출은 App Store Connect에서 직접)
