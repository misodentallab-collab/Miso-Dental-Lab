# MISO Dental Lab — iOS App Store 빌드 (맥 없이 클라우드 빌드)
# Codemagic → 이 레포 연결 → App Store Connect API 키 통합 등록 후 빌드
workflows:
  ios-appstore:
    name: MISO iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: MISO_ASC_KEY      # ← Codemagic Teams > Integrations에 등록한 API 키 이름
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.misodentallab.app
      vars:
        XCODE_WORKSPACE: "src/MISO.xcworkspace"
        XCODE_SCHEME: "MISO"
        APP_STORE_APPLE_ID: 6789481602     # MISO Dental Lab (App Store Connect)
      xcode: latest
    scripts:
      - name: Set up provisioning profiles
        script: xcode-project use-profiles
      - name: Increment build number
        script: |
          agvtool new-version -all $(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0) + 1))
      - name: Build ipa
        script: |
          xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true          # TestFlight 업로드 (심사 제출은 App Store Connect에서 직접)
